<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <link
            href="https://fonts.googleapis.com/css?family=Manrope:200,300,regular,500,600,700,800"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
        <script src="app.js" defer></script>
        <title>Frontend Mentor | Interactive pricing component</title>
    </head>
    <body>
        <div class="wrapper">
            <div class="content">
                <h1>Simple, traffic-based pricing</h1>
                <p>Sign-up for our 30-day trial. No credit card required.</p>
            </div>
            <div class="card">
                <div class="card__header">
                    <p class="views">100K PAGEVIEWS</p>
                    <p><span class="price" id="price">$0.00</span> / month</p>
                </div>
                <div class="card__slider">
                    <input
                        type="range"
                        min="0"
                        max="4"
                        step="1"
                        value="0"
                        id="slider"
                    />
                </div>
                <div class="card__billing">
                    <div class="billing">
                        <span class="billing__text">Monthly Billing</span>

                        <label class="toggle">
                            <input type="checkbox" />
                            <span class="toggle__track">
                                <span class="toggle__thumb"></span>
                            </span>
                        </label>

                        <div class="billing__yearly">
                            <span>Yearly Billing</span>
                            <span class="discount">25% discount</span>
                        </div>
                    </div>
                </div>
                <div class="line"></div>
                <div class="card__footer">
                    <ul class="lists">
                        <li>
                            <img
                                src="./images/icon-check.svg"
                                alt="check-icon"
                            />Unlimited websites
                        </li>
                        <li>
                            <img
                                src="./images/icon-check.svg"
                                alt="check-icon"
                            />100% data ownership
                        </li>
                        <li>
                            <img
                                src="./images/icon-check.svg"
                                alt="check-icon"
                            />Email reports
                        </li>
                    </ul>
                    <button class="btn">Start my trial</button>
                </div>
            </div>
        </div>
    </body>
</html>
